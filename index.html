<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HTML Pages</title>
<style>
  :root {
    color-scheme: light dark;
    --bg: #f5f7fb;
    --fg: #1e2430;
    --muted: #5b6472;
    --line: #d7dce7;
    --link: #175ddc;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #11151d;
      --fg: #eef2f8;
      --muted: #aab3c1;
      --line: #303847;
      --link: #8bb6ff;
    }
  }

  * {
    box-sizing: border-box;
  }

  body {
    margin: 0;
    min-height: 100vh;
    background: var(--bg);
    color: var(--fg);
    font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
    line-height: 1.5;
  }

  main {
    width: min(720px, calc(100% - 32px));
    margin: 0 auto;
    padding: 48px 0;
  }

  h1 {
    margin: 0 0 8px;
    font-size: 32px;
    font-weight: 700;
  }

  p {
    margin: 0 0 24px;
    color: var(--muted);
  }

  ul {
    margin: 0;
    padding: 0;
    list-style: none;
    border-top: 1px solid var(--line);
  }

  li {
    border-bottom: 1px solid var(--line);
  }

  a {
    display: block;
    padding: 14px 0;
    color: var(--link);
    font-size: 18px;
    font-weight: 600;
    text-decoration: none;
  }

  a:hover,
  a:focus-visible {
    text-decoration: underline;
  }
</style>
</head>
<body>
<main>
  <h1>HTML Pages</h1>
  <p>Root HTML files in this repository.</p>
  <ul>
    <li><a href="./adder.html">adder.html</a></li>
    <li><a href="./index.html">index.html</a></li>
  </ul>
</main>
</body>
</html>
